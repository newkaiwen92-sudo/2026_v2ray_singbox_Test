<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <meta name="keywords" content="{{ page.keywords | default: site.keywords }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap site-header__inner">
        <div>
          <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>
        <div class="site-actions">
          <nav class="share-icons" aria-label="分享当前页面">
            <a class="share-icon" data-share="x" href="#" target="_blank" rel="noopener noreferrer" aria-label="分享到 X" title="分享到 X">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18.9 2.25h3.45l-7.54 8.62L23.7 21.75h-6.96l-5.45-6.7-5.86 6.7H1.98l8.06-9.22L1.5 2.25h7.14l4.92 6.12 5.34-6.12zm-1.22 17.42h1.91L7.6 4.23H5.56l12.12 15.44z"></path>
              </svg>
            </a>
            <a class="share-icon" data-share="reddit" href="#" target="_blank" rel="noopener noreferrer" aria-label="分享到 Reddit" title="分享到 Reddit">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.23 15.15c.21.2.22.53.02.74-.64.68-1.63 1.06-2.79 1.06s-2.16-.38-2.8-1.06a.53.53 0 0 1 .77-.72c.44.47 1.15.73 2.03.73s1.58-.26 2.03-.73a.53.53 0 0 1 .74-.02zM8.9 13a1.05 1.05 0 1 0 0-2.1 1.05 1.05 0 0 0 0 2.1zm5.2 0a1.05 1.05 0 1 0 0-2.1 1.05 1.05 0 0 0 0 2.1z"></path>
                <path d="M22 12a2.5 2.5 0 0 0-4.28-1.77 7.4 7.4 0 0 0-4.91-1.64l1-3.17 2.72.64a1.9 1.9 0 1 0 .24-1.05l-3.08-.72a.53.53 0 0 0-.63.35l-1.21 3.86A7.36 7.36 0 0 0 7 10.2 2.5 2.5 0 1 0 4.5 14.4c.1 3.02 3.2 5.35 6.95 5.35s6.84-2.33 6.95-5.35A2.5 2.5 0 0 0 22 12zm-10.55 6.7c-3.16 0-5.73-1.85-5.73-4.12 0-2.28 2.57-4.13 5.73-4.13s5.73 1.85 5.73 4.13c0 2.27-2.57 4.12-5.73 4.12z"></path>
              </svg>
            </a>
            <a class="share-icon" data-share="facebook" href="#" target="_blank" rel="noopener noreferrer" aria-label="分享到 Facebook" title="分享到 Facebook">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M13.5 21.75v-8.1h2.73l.41-3.16H13.5V8.48c0-.92.26-1.54 1.58-1.54h1.69V4.12c-.82-.1-1.64-.15-2.46-.14-2.44 0-4.1 1.49-4.1 4.24v2.27H7.45v3.16h2.76v8.1h3.29z"></path>
              </svg>
            </a>
            <a class="share-icon" data-share="linkedin" href="#" target="_blank" rel="noopener noreferrer" aria-label="分享到 LinkedIn" title="分享到 LinkedIn">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6.15 8.34a1.92 1.92 0 1 1 0-3.84 1.92 1.92 0 0 1 0 3.84zM4.5 9.72h3.3v10.53H4.5V9.72zm5.49 0h3.16v1.44h.05c.44-.84 1.52-1.72 3.13-1.72 3.34 0 3.96 2.2 3.96 5.06v5.75h-3.29v-5.1c0-1.22-.02-2.79-1.7-2.79-1.7 0-1.96 1.32-1.96 2.7v5.19H9.99V9.72z"></path>
              </svg>
            </a>
            <a class="share-icon" data-share="telegram" href="#" target="_blank" rel="noopener noreferrer" aria-label="分享到 Telegram" title="分享到 Telegram">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21.77 4.56a1 1 0 0 0-1.05-.14L2.98 11.9a1 1 0 0 0 .1 1.88l4.2 1.4 1.52 4.76a1 1 0 0 0 1.77.3l2.4-3.1 4.1 3a1 1 0 0 0 1.58-.58l3.28-13.92a1 1 0 0 0-.16-.88zm-4.8 13.03-3.73-2.72a1 1 0 0 0-1.4.2l-1.62 2.1-.95-2.96 8.31-6.98-10.2 5.4-3.12-1.04 15.82-6.67-3.11 12.67z"></path>
              </svg>
            </a>
          </nav>
          <a class="apply-btn" href="https://puffy-sled-767.notion.site/323893a043ae8068997dc90507903576" target="_blank" rel="noopener noreferrer">申请机场测试</a>
        </div>
      </div>
    </header>
    <main class="wrap">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="wrap">
        <p>{{ site.title }} · 基于 GitHub Pages 发布的静态测评站点。</p>
      </div>
    </footer>
    <script>
      (() => {
        const normalizeText = (value) => value.replace(/\s+/g, "");
        const tables = document.querySelectorAll(".post-content table");

        tables.forEach((table) => {
          const headRow = table.querySelector("thead tr");
          const bodyRows = table.querySelectorAll("tbody tr");
          if (!headRow || !bodyRows.length) {
            return;
          }

          const headers = Array.from(headRow.querySelectorAll("th"));
          const statusIndex = headers.findIndex((th) =>
            normalizeText(th.textContent || "").includes("当前状态")
          );
          if (statusIndex === -1) {
            return;
          }

          bodyRows.forEach((row) => {
            const cells = row.querySelectorAll("td");
            if (cells.length <= statusIndex) {
              return;
            }

            const statusCell = cells[statusIndex];
            const statusText = normalizeText(statusCell.textContent || "");
            if (statusText.includes("跑路")) {
              row.classList.add("status-danger");
              statusCell.classList.add("status-danger-cell");
              return;
            }

            if (statusText.includes("风险")) {
              row.classList.add("status-warning");
              statusCell.classList.add("status-warning-cell");
            }
          });
        });
      })();
    </script>
    <script>
      (() => {
        const pageUrl = window.location.href;
        const pageTitle = document.title;
        const shareMap = {
          x: `https://x.com/intent/tweet?text=${encodeURIComponent(pageTitle)}&url=${encodeURIComponent(pageUrl)}`,
          reddit: `https://www.reddit.com/submit?url=${encodeURIComponent(pageUrl)}&title=${encodeURIComponent(pageTitle)}`,
          facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(pageUrl)}`,
          linkedin: `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(pageUrl)}`,
          telegram: `https://t.me/share/url?url=${encodeURIComponent(pageUrl)}&text=${encodeURIComponent(pageTitle)}`
        };

        document.querySelectorAll(".share-icon[data-share]").forEach((link) => {
          const key = link.getAttribute("data-share");
          const target = shareMap[key];
          if (target) {
            link.setAttribute("href", target);
          }
        });
      })();
    </script>
  </body>
</html>
