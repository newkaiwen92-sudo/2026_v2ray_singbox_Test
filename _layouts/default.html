<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap site-header__inner">
        <div>
          <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <p class="site-tagline">{{ site.description }}</p>
        </div>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/monthly/' | relative_url }}">月报</a>
          <a href="{{ '/weekly/' | relative_url }}">周报</a>
          <a href="{{ '/archive/' | relative_url }}">归档</a>
        </nav>
      </div>
    </header>
    <main class="wrap">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="wrap">
        <p>{{ site.title }} · 基于 GitHub Pages 发布的静态测评站点。</p>
      </div>
    </footer>
  </body>
</html>
