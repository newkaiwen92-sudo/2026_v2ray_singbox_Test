<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    <meta name="keywords" content="{{ page.keywords | default: site.keywords }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap site-header__inner">
        <div>
          <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        </div>
        <a class="apply-btn" href="https://puffy-sled-767.notion.site/323893a043ae8068997dc90507903576" target="_blank" rel="noopener noreferrer">申请机场测试</a>
      </div>
    </header>
    <main class="wrap">
      {{ content }}
    </main>
    <footer class="site-footer">
      <div class="wrap">
        <p>{{ site.title }} · 基于 GitHub Pages 发布的静态测评站点。</p>
      </div>
    </footer>
    <script>
      (() => {
        const normalizeText = (value) => value.replace(/\s+/g, "");
        const tables = document.querySelectorAll(".post-content table");

        tables.forEach((table) => {
          const headRow = table.querySelector("thead tr");
          const bodyRows = table.querySelectorAll("tbody tr");
          if (!headRow || !bodyRows.length) {
            return;
          }

          const headers = Array.from(headRow.querySelectorAll("th"));
          const statusIndex = headers.findIndex((th) =>
            normalizeText(th.textContent || "").includes("当前状态")
          );
          if (statusIndex === -1) {
            return;
          }

          bodyRows.forEach((row) => {
            const cells = row.querySelectorAll("td");
            if (cells.length <= statusIndex) {
              return;
            }

            const statusCell = cells[statusIndex];
            const statusText = normalizeText(statusCell.textContent || "");
            if (statusText.includes("跑路")) {
              row.classList.add("status-danger");
              statusCell.classList.add("status-danger-cell");
            }
          });
        });
      })();
    </script>
  </body>
</html>
